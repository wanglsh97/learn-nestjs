<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 820" role="img" aria-labelledby="title desc">
  <title id="title">NestJS request lifecycle</title><desc id="desc">A successful request crosses Middleware, Guard, Interceptor, Pipe, Controller, and Service; a Guard exception is shaped by the Filter.</desc>
  <style>text{font-family:'Patrick Hand','LXGW WenKai','Kaiti SC','KaiTi',sans-serif;fill:#1b1b1f}.t{font-size:26px;font-weight:600}.h{font-size:17px;font-weight:600}.d{font-size:13px;fill:#495057}.edge{fill:none;stroke:#4c6ef5;stroke-width:2;marker-end:url(#a)}.err{fill:none;stroke:#c92a2a;stroke-width:2;stroke-dasharray:7 6;marker-end:url(#r)}rect,path{stroke-linecap:round;stroke-linejoin:round}</style>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#4c6ef5"/></marker><marker id="r" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#c92a2a"/></marker></defs>
  <rect width="1120" height="820" fill="#fff"/><text x="42" y="50" class="t">How one write request crosses NestJS</text><text x="42" y="74" class="d">Blue is the success path; red is the short circuit after the Guard throws</text>
  <g text-anchor="middle"><rect x="430" y="105" width="260" height="62" rx="31" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="2"/><text x="560" y="132" class="h">HTTP request</text><text x="560" y="153" class="d">POST /api/notes</text>
  <rect x="410" y="215" width="300" height="72" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2"/><text x="560" y="245" class="h">RequestIdMiddleware</text><text x="560" y="268" class="d">create/forward x-request-id · next()</text>
  <path d="M560 325l100 62-100 62-100-62Z" fill="#ffec99" stroke="#e67700" stroke-width="2"/><text x="560" y="381" class="h">ApiKeyGuard</text><text x="560" y="403" class="d">valid key?</text>
  <rect x="400" y="493" width="320" height="72" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/><text x="560" y="523" class="h">Interceptor · before</text><text x="560" y="546" class="d">capture start · next.handle()</text>
  <rect x="400" y="613" width="320" height="72" rx="12" fill="#e5dbff" stroke="#7048e8" stroke-width="2"/><text x="560" y="643" class="h">Pipe → Controller → Service</text><text x="560" y="666" class="d">trim body · adapt protocol · create note</text>
  <rect x="400" y="733" width="320" height="62" rx="31" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/><text x="560" y="759" class="h">Interceptor · after → response</text><text x="560" y="781" class="d">log duration · serialize Note</text>
  <rect x="800" y="493" width="260" height="82" rx="12" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2"/><text x="930" y="523" class="h">HttpExceptionFilter</text><text x="930" y="546" class="d">shape statusCode/message/path</text><text x="930" y="564" class="d">return 401; skip later stages</text></g>
  <path class="edge" d="M560 167V213"/><path class="edge" d="M560 287V323"/><path class="edge" d="M560 449V491"/><path class="edge" d="M560 565V611"/><path class="edge" d="M560 685V731"/><text x="575" y="474" class="d" fill="#2b8a3e">yes</text>
  <path class="err" d="M660 387H760Q790 387 790 417V534H798"/><text x="690" y="373" class="d" fill="#c92a2a">no / throw</text>
</svg>
