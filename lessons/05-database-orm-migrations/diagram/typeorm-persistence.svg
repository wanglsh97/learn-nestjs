<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc"><title id="title">TypeORM 持久化边界</title><desc id="desc">控制器调用服务，服务使用仓储，仓储将实体映射到 SQL.js，迁移负责演进数据库结构。</desc><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:Arial,sans-serif;fill:#1b1b1f}.t{font-size:25px;font-weight:700}.l{font-size:18px;font-weight:700}.n{font-size:13px;fill:#495057}.b{stroke-width:2}.p{fill:none;stroke:#495057;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1040" height="430" fill="#fff"/><text x="42" y="48" class="t">TypeORM 持久化边界</text><rect x="55" y="118" width="170" height="82" rx="12" class="b" fill="#d0ebff" stroke="#1971c2"/><text x="140" y="153" text-anchor="middle" class="l">控制器</text><text x="140" y="178" text-anchor="middle" class="n">HTTP 适配</text><rect x="285" y="118" width="170" height="82" rx="12" class="b" fill="#d3f9d8" stroke="#2b8a3e"/><text x="370" y="153" text-anchor="middle" class="l">NotesService</text><text x="370" y="178" text-anchor="middle" class="n">业务用例</text><rect x="515" y="118" width="180" height="82" rx="12" class="b" fill="#ffec99" stroke="#e67700"/><text x="605" y="153" text-anchor="middle" class="l">Note 仓储</text><text x="605" y="178" text-anchor="middle" class="n">持久化接口</text><rect x="755" y="108" width="220" height="102" rx="12" class="b" fill="#e5dbff" stroke="#7048e8"/><text x="865" y="148" text-anchor="middle" class="l">SQL.js</text><text x="865" y="174" text-anchor="middle" class="n">lesson-05.sqlite</text><path d="M225 159H285" class="p"/><path d="M455 159H515" class="p"/><path d="M695 159H755" class="p"/><rect x="515" y="285" width="180" height="82" rx="12" class="b" fill="#f1f3f5" stroke="#495057"/><text x="605" y="320" text-anchor="middle" class="l">Note 实体</text><text x="605" y="345" text-anchor="middle" class="n">对象 ↔ 表字段</text><path d="M605 285V200" class="p"/><rect x="755" y="285" width="220" height="82" rx="12" class="b" fill="#ffe8cc" stroke="#d9480f"/><text x="865" y="320" text-anchor="middle" class="l">迁移 up / down</text><text x="865" y="345" text-anchor="middle" class="n">结构变更历史</text><path d="M865 285V210" class="p"/></svg>
