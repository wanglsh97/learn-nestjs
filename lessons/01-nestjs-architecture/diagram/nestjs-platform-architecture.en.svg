<svg viewBox="0 0 920 660" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Patrick Hand', 'LXGW WenKai', 'Kaiti SC', 'KaiTi', sans-serif; fill: #1b1b1f; }
    rect, path, line, polygon, ellipse { stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e9ecef" stroke-width="0.5"/></pattern>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1971c2"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2b8a3e"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#d9480f"/></marker>
  </defs>
  <rect width="920" height="660" fill="#ffffff"/><rect width="920" height="660" fill="url(#grid)"/>

  <rect x="70" y="90" width="780" height="150" rx="12" fill="none" stroke="#1971c2" stroke-width="1.4" stroke-dasharray="8,5"/><text x="88" y="114" fill="#1971c2" font-size="14" font-weight="600">APPLICATION CODE</text>
  <rect x="190" y="280" width="540" height="110" rx="12" fill="none" stroke="#2b8a3e" stroke-width="1.4" stroke-dasharray="8,5"/><text x="208" y="304" fill="#2b8a3e" font-size="14" font-weight="600">NESTJS FRAMEWORK</text>
  <rect x="145" y="430" width="630" height="100" rx="12" fill="none" stroke="#e67700" stroke-width="1.4" stroke-dasharray="8,5"/><text x="163" y="454" fill="#e67700" font-size="14" font-weight="600">HTTP PLATFORM ADAPTER</text>

  <path d="M 460 210 L 460 320" fill="none" stroke="#1971c2" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 460 370 L 460 405 L 290 405 L 290 470" fill="none" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 460 405 L 630 405 L 630 470" fill="none" stroke="#2b8a3e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 290 510 L 290 555 L 460 555 L 460 585" fill="none" stroke="#495057" stroke-width="1.8" marker-end="url(#arrow-green)"/>
  <path d="M 630 510 L 630 555 L 460 555" fill="none" stroke="#495057" stroke-width="1.8"/>
  <path d="M 250 180 C 80 260, 80 470, 230 485" fill="none" stroke="#d9480f" stroke-width="1.6" stroke-dasharray="7,5" marker-end="url(#arrow-orange)"/><text x="88" y="340" fill="#d9480f" font-size="12">Native API when needed</text>

  <rect x="110" y="130" width="220" height="80" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="1.8"/><text x="220" y="163" font-size="18" font-weight="600" text-anchor="middle">Controller</text><text x="220" y="188" fill="#495057" font-size="14" text-anchor="middle">HTTP input and output</text>
  <rect x="350" y="130" width="220" height="80" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="1.8"/><text x="460" y="163" font-size="18" font-weight="600" text-anchor="middle">Module</text><text x="460" y="188" fill="#495057" font-size="14" text-anchor="middle">Feature boundaries</text>
  <rect x="590" y="130" width="220" height="80" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="1.8"/><text x="700" y="163" font-size="18" font-weight="600" text-anchor="middle">Provider</text><text x="700" y="188" fill="#495057" font-size="14" text-anchor="middle">Logic and dependencies</text>

  <rect x="230" y="320" width="460" height="50" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="1.8"/><text x="460" y="342" font-size="18" font-weight="600" text-anchor="middle">NestJS Application API</text><text x="460" y="360" fill="#495057" font-size="14" text-anchor="middle">decorators · metadata · DI · lifecycle</text>
  <rect x="190" y="470" width="200" height="40" rx="12" fill="#ffec99" stroke="#e67700" stroke-width="1.8"/><text x="290" y="497" font-size="18" font-weight="600" text-anchor="middle">Express (default)</text>
  <rect x="530" y="470" width="200" height="40" rx="12" fill="#ffec99" stroke="#e67700" stroke-width="1.8"/><text x="630" y="497" font-size="18" font-weight="600" text-anchor="middle">Fastify (optional)</text>
  <rect x="270" y="585" width="380" height="50" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="1.8"/><text x="460" y="607" font-size="18" font-weight="600" text-anchor="middle">Node.js</text><text x="460" y="626" fill="#495057" font-size="14" text-anchor="middle">HTTP server runtime</text>

  <text x="30" y="40" font-size="24" font-weight="600">NestJS layered abstraction</text><text x="30" y="64" fill="#495057" font-size="14">Application code targets NestJS while the HTTP platform remains replaceable and accessible</text>
</svg>
