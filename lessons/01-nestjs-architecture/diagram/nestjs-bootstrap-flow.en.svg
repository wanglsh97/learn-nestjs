<svg viewBox="0 0 920 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NestJS application bootstrap flow</title><desc id="desc">The flow from main.ts to serving requests, including the shared configureApp stage.</desc>
  <style>text{font-family:'Patrick Hand','LXGW WenKai','Kaiti SC','KaiTi',sans-serif;fill:#1b1b1f}rect,path,line,polygon{stroke-linecap:round;stroke-linejoin:round}.node{stroke-width:1.8}.main{font-size:18px;font-weight:600}.sub{font-size:14px;fill:#495057}</style>
  <defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="#e9ecef" stroke-width=".5"/></pattern><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4c6ef5"/></marker></defs>
  <rect width="920" height="1000" fill="#fff"/><rect width="920" height="1000" fill="url(#grid)"/>
  <text x="30" y="40" font-size="24" font-weight="600">NestJS application bootstrap flow</text><text x="30" y="64" class="sub">create assembles the graph; listen initializes routes and starts the HTTP adapter</text>
  <g stroke="#4c6ef5" stroke-width="2" marker-end="url(#arrow)"><line x1="460" y1="145" x2="460" y2="190"/><line x1="460" y1="260" x2="460" y2="310"/><line x1="460" y1="380" x2="460" y2="430"/><line x1="460" y1="500" x2="460" y2="550"/><line x1="460" y1="620" x2="460" y2="670"/><line x1="460" y1="740" x2="460" y2="790"/><line x1="460" y1="860" x2="460" y2="910"/></g>
  <g text-anchor="middle"><rect class="node" x="300" y="90" width="320" height="55" rx="28" fill="#dbe4ff" stroke="#4c6ef5"/><text x="460" y="114" class="main">main.ts</text><text x="460" y="134" class="sub">execute bootstrap()</text>
  <rect class="node" x="230" y="190" width="460" height="70" rx="12" fill="#d3f9d8" stroke="#2b8a3e"/><text x="460" y="220" class="main">NestFactory.create(AppModule)</text><text x="460" y="244" class="sub">scan modules · instantiate dependencies/controllers · return app</text>
  <rect class="node" x="230" y="310" width="460" height="70" rx="12" fill="#ffec99" stroke="#e67700"/><text x="460" y="340" class="main">configureApp(app, env)</text><text x="460" y="364" class="sub">set global prefix · enable shutdown hooks</text>
  <rect class="node" x="230" y="430" width="460" height="70" rx="12" fill="#d0ebff" stroke="#1971c2"/><text x="460" y="460" class="main">call app.listen(PORT)</text><text x="460" y="484" class="sub">enter Nest initialization and listening</text>
  <rect class="node" x="230" y="550" width="460" height="70" rx="12" fill="#ffec99" stroke="#e67700"/><text x="460" y="580" class="main">app.init() maps routes</text><text x="460" y="604" class="sub">apply prefix: GET /api · GET /api/health</text>
  <rect class="node" x="230" y="670" width="460" height="70" rx="12" fill="#d0ebff" stroke="#1971c2"/><text x="460" y="700" class="main">HTTP adapter starts listening</text><text x="460" y="724" class="sub">Express binds port 3001 by default</text>
  <rect class="node" x="230" y="790" width="460" height="70" rx="12" fill="#d3f9d8" stroke="#2b8a3e"/><text x="460" y="820" class="main">listen Promise resolves</text><text x="460" y="844" class="sub">bootstrap() can read the URL and log it</text>
  <rect class="node" x="300" y="910" width="320" height="55" rx="28" fill="#dbe4ff" stroke="#4c6ef5"/><text x="460" y="934" class="main">Application ready</text><text x="460" y="954" class="sub">HTTP requests can now be served</text></g>
</svg>
