<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 610" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:'Kaiti SC','KaiTi',Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.p{fill:none;stroke:#495057;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1040" height="610" fill="#fff"/><text x="40" y="46" class="t">发布后任务：稳定身份、重试与离线降级</text><rect x="45" y="115" width="190" height="75" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/><text x="140" y="148" text-anchor="middle" class="l">发布事务提交</text><text x="140" y="171" text-anchor="middle" class="n">Note + 审计 + 幂等键</text><path d="M235 152H315" class="p"/><path d="M405 95L495 152L405 209L315 152Z" fill="#ffec99" stroke="#e67700" stroke-width="2"/><text x="405" y="147" text-anchor="middle" class="l">Redis 就绪？</text><text x="405" y="170" text-anchor="middle" class="n">CacheService 状态</text><path d="M495 152H575" class="p"/><text x="520" y="138" class="n">是</text><rect x="575" y="105" width="190" height="95" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2"/><text x="670" y="139" text-anchor="middle" class="l">BullMQ 队列</text><text x="670" y="163" text-anchor="middle" class="n">稳定 jobId</text><text x="670" y="184" text-anchor="middle" class="n">3 次尝试 + 退避</text><path d="M765 152H830" class="p"/><rect x="830" y="115" width="170" height="75" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/><text x="915" y="148" text-anchor="middle" class="l">工作进程</text><text x="915" y="171" text-anchor="middle" class="n">通知处理</text><path d="M405 209V340" class="p"/><text x="420" y="275" class="n">否</text><rect x="300" y="340" width="210" height="85" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="2"/><text x="405" y="374" text-anchor="middle" class="l">queueMicrotask</text><text x="405" y="398" text-anchor="middle" class="n">进程内 Set 去重</text><rect x="555" y="340" width="390" height="100" rx="12" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2"/><text x="750" y="375" text-anchor="middle" class="l">提交后入队失败</text><text x="750" y="400" text-anchor="middle" class="n">同幂等键重试：数据库重放，再次入队</text><text x="750" y="422" text-anchor="middle" class="n">更强保证：事务发件箱</text><path d="M670 200C670 250 710 290 735 340" class="p"/><text x="40" y="555" class="n">至少一次语义：任务可能重试，任务 ID 与消费者都必须幂等；完成记录仅在有界窗口内保留。</text></svg>
