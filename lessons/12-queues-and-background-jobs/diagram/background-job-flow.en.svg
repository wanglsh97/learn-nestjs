<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 610" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.p{fill:none;stroke:#495057;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1040" height="610" fill="#fff"/><text x="40" y="46" class="t">Post-publish work: stable identity, retry, offline fallback</text><rect x="45" y="115" width="190" height="75" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/><text x="140" y="148" text-anchor="middle" class="l">Publish committed</text><text x="140" y="171" text-anchor="middle" class="n">Note + Audit + Key</text><path d="M235 152H315" class="p"/><path d="M405 95L495 152L405 209L315 152Z" fill="#ffec99" stroke="#e67700" stroke-width="2"/><text x="405" y="147" text-anchor="middle" class="l">Redis ready?</text><text x="405" y="170" text-anchor="middle" class="n">CacheService state</text><path d="M495 152H575" class="p"/><text x="520" y="138" class="n">Yes</text><rect x="575" y="105" width="190" height="95" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2"/><text x="670" y="139" text-anchor="middle" class="l">BullMQ Queue</text><text x="670" y="163" text-anchor="middle" class="n">stable jobId</text><text x="670" y="184" text-anchor="middle" class="n">3 attempts + backoff</text><path d="M765 152H830" class="p"/><rect x="830" y="115" width="170" height="75" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/><text x="915" y="148" text-anchor="middle" class="l">Worker</text><text x="915" y="171" text-anchor="middle" class="n">notification handler</text><path d="M405 209V340" class="p"/><text x="420" y="275" class="n">No</text><rect x="300" y="340" width="210" height="85" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="2"/><text x="405" y="374" text-anchor="middle" class="l">queueMicrotask</text><text x="405" y="398" text-anchor="middle" class="n">process-local Set dedupe</text><rect x="555" y="340" width="390" height="100" rx="12" fill="#ffe3e3" stroke="#c92a2a" stroke-width="2"/><text x="750" y="375" text-anchor="middle" class="l">Enqueue fails after commit</text><text x="750" y="400" text-anchor="middle" class="n">same-key retry: DB replay, enqueue again</text><text x="750" y="422" text-anchor="middle" class="n">stronger guarantee: Transactional Outbox</text><path d="M670 200C670 250 710 290 735 340" class="p"/><text x="40" y="555" class="n">At least once: jobs can retry, so both Job ID and consumer must be idempotent; completed IDs have bounded retention.</text></svg>
