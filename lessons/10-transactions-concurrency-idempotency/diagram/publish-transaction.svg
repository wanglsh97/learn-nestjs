<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 690" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:'Kaiti SC','KaiTi',Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.p{fill:none;stroke:#495057;stroke-width:2;marker-end:url(#a)}.b{stroke-width:2}</style></defs><rect width="1040" height="690" fill="#fff"/><text x="40" y="46" class="t">发布事务：同键重放、异义冲突、首次原子写入</text><rect x="400" y="75" width="240" height="68" rx="12" fill="#d0ebff" stroke="#1971c2" class="b"/><text x="520" y="115" text-anchor="middle" class="l">POST /notes/:id/publish</text><path d="M520 143V185" class="p"/><path d="M520 180L620 240L520 300L420 240Z" fill="#ffec99" stroke="#e67700" class="b"/><text x="520" y="235" text-anchor="middle" class="l">Key 已存在？</text><text x="520" y="258" text-anchor="middle" class="n">userId:key</text><rect x="75" y="205" width="220" height="70" rx="12" fill="#d3f9d8" stroke="#2b8a3e" class="b"/><text x="185" y="235" text-anchor="middle" class="l">同一 Note → 200</text><text x="185" y="258" text-anchor="middle" class="n">重放保存的结果</text><path d="M420 240H295" class="p"/><rect x="75" y="320" width="220" height="70" rx="12" fill="#ffe3e3" stroke="#c92a2a" class="b"/><text x="185" y="350" text-anchor="middle" class="l">不同 Note → 409</text><text x="185" y="373" text-anchor="middle" class="n">Key 与语义不匹配</text><path d="M420 260C350 280 300 310 260 320" class="p"/><rect x="390" y="355" width="260" height="235" rx="15" fill="#f8f9fa" stroke="#7048e8" stroke-width="2" stroke-dasharray="8 6"/><text x="410" y="385" class="l">数据库事务</text><rect x="430" y="415" width="180" height="48" rx="10" fill="#e5dbff" stroke="#7048e8"/><text x="520" y="445" text-anchor="middle" class="n">1. Note → published</text><rect x="430" y="485" width="180" height="48" rx="10" fill="#e5dbff" stroke="#7048e8"/><text x="520" y="515" text-anchor="middle" class="n">2. AuditLog</text><rect x="430" y="555" width="180" height="48" rx="10" fill="#ffe8cc" stroke="#d9480f"/><text x="520" y="585" text-anchor="middle" class="n">3. IdempotencyRecord</text><path d="M520 300V355" class="p"/><rect x="750" y="420" width="230" height="85" rx="12" fill="#ffe3e3" stroke="#c92a2a" class="b"/><text x="865" y="453" text-anchor="middle" class="l">唯一键竞争</text><text x="865" y="478" text-anchor="middle" class="n">回滚后读取获胜结果</text><path d="M650 470H750" class="p"/><rect x="750" y="550" width="230" height="70" rx="12" fill="#d3f9d8" stroke="#2b8a3e" class="b"/><text x="865" y="590" text-anchor="middle" class="l">提交 → 200</text><path d="M650 575H750" class="p"/><text x="40" y="660" class="n">任何事务内写入失败：三项全部回滚；外部 HTTP / 消息不在该事务中。</text></svg>
