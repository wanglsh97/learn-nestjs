<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.p{stroke:#495057;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1040" height="520" fill="#fff"/><text x="42" y="48" class="t">Application security: each layer reduces a different risk</text><rect x="50" y="120" width="170" height="90" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="2"/><text x="135" y="158" text-anchor="middle" class="l">Browser / Client</text><text x="135" y="184" text-anchor="middle" class="n">Origin + HTTP request</text><rect x="270" y="110" width="170" height="110" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/><text x="355" y="148" text-anchor="middle" class="l">Helmet + CORS</text><text x="355" y="174" text-anchor="middle" class="n">headers / browser origin</text><text x="355" y="197" text-anchor="middle" class="n">not authentication</text><rect x="490" y="110" width="170" height="110" rx="12" fill="#ffec99" stroke="#e67700" stroke-width="2"/><text x="575" y="148" text-anchor="middle" class="l">ThrottlerGuard</text><text x="575" y="174" text-anchor="middle" class="n">global 100 / min</text><text x="575" y="197" text-anchor="middle" class="n">Auth 5 / min</text><rect x="710" y="110" width="270" height="110" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/><text x="845" y="148" text-anchor="middle" class="l">DTO → JWT → RBAC → Service</text><text x="845" y="174" text-anchor="middle" class="n">input, identity, role, ownership</text><text x="845" y="197" text-anchor="middle" class="n">trusted business boundary</text><path d="M220 165H270M440 165H490M660 165H710" class="p"/><rect x="270" y="330" width="490" height="105" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2"/><text x="515" y="370" text-anchor="middle" class="l">Startup configuration validation</text><text x="515" y="398" text-anchor="middle" class="n">JWT secret, CORS origins, port → reject invalid startup</text><path d="M515 330V250" class="p"/><text x="42" y="482" class="n">Defense in depth: later boundaries still execute if one layer is bypassed.</text></svg>
