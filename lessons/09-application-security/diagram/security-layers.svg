<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L10 3L0 6Z" fill="#495057"/></marker><style>text{font-family:'Kaiti SC','KaiTi',Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.p{stroke:#495057;stroke-width:2;marker-end:url(#a)}</style></defs><rect width="1040" height="520" fill="#fff"/><text x="42" y="48" class="t">应用安全：每层缩小不同风险</text><rect x="50" y="120" width="170" height="90" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="2"/><text x="135" y="158" text-anchor="middle" class="l">浏览器 / 客户端</text><text x="135" y="184" text-anchor="middle" class="n">Origin + HTTP 请求</text><rect x="270" y="110" width="170" height="110" rx="12" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/><text x="355" y="148" text-anchor="middle" class="l">Helmet + CORS</text><text x="355" y="174" text-anchor="middle" class="n">响应头 / 浏览器来源</text><text x="355" y="197" text-anchor="middle" class="n">不替代认证</text><rect x="490" y="110" width="170" height="110" rx="12" fill="#ffec99" stroke="#e67700" stroke-width="2"/><text x="575" y="148" text-anchor="middle" class="l">ThrottlerGuard</text><text x="575" y="174" text-anchor="middle" class="n">全局 100 / min</text><text x="575" y="197" text-anchor="middle" class="n">Auth 5 / min</text><rect x="710" y="110" width="270" height="110" rx="12" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/><text x="845" y="148" text-anchor="middle" class="l">JWT → RBAC → DTO → 服务</text><text x="845" y="174" text-anchor="middle" class="n">身份、角色、输入、所有权</text><text x="845" y="197" text-anchor="middle" class="n">可信业务边界</text><path d="M220 165H270M440 165H490M660 165H710" class="p"/><rect x="270" y="330" width="490" height="105" rx="12" fill="#ffe8cc" stroke="#d9480f" stroke-width="2"/><text x="515" y="370" text-anchor="middle" class="l">启动配置校验</text><text x="515" y="398" text-anchor="middle" class="n">JWT_SECRET 长度、CORS_ORIGINS、端口 → 无效则拒绝启动</text><path d="M515 330V250" class="p"/><text x="42" y="482" class="n">分层防护：某一层被绕过时，后续边界仍独立执行。</text></svg>
