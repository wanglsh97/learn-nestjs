<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 650" role="img" aria-labelledby="title desc">
  <title id="title">Lesson 2 module and dependency injection graph</title>
  <desc id="desc">AppModule imports NotesModule and HealthModule, NotesModule imports ClockModule, and the container injects NotesService and ClockService into their consumers.</desc>
  <defs>
    <style>
      text { font-family: 'Patrick Hand', 'LXGW WenKai', 'Kaiti SC', 'KaiTi', sans-serif; fill: #1b1b1f; }
      .title { font-size: 26px; font-weight: 600; }
      .label { font-size: 18px; font-weight: 600; }
      .desc { font-size: 14px; fill: #495057; }
      .edge { fill: none; stroke: #495057; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .inject { fill: none; stroke: #d9480f; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-orange); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#495057"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#d9480f"/></marker>
  </defs>
  <rect width="1080" height="650" fill="#ffffff"/>
  <text x="42" y="48" class="title">Modules define visibility; the container assembles instances</text>
  <rect x="40" y="78" width="1000" height="520" rx="18" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="8 7"/>
  <text x="62" y="108" class="desc">Nest application context</text>

  <rect x="410" y="126" width="260" height="78" rx="12" fill="#dbe4ff" stroke="#4c6ef5" stroke-width="2"/>
  <text x="540" y="158" class="label" text-anchor="middle">AppModule</text>
  <text x="540" y="183" class="desc" text-anchor="middle">Root module · composes boundaries</text>

  <path class="edge" d="M480 204 C430 245 330 247 280 284"/>
  <text x="370" y="245" class="desc">imports</text>
  <path class="edge" d="M600 204 C650 220 690 230 733 234"/>
  <text x="665" y="215" class="desc">imports</text>

  <rect x="735" y="205" width="190" height="58" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="2"/>
  <text x="830" y="231" class="label" text-anchor="middle">HealthModule</text>
  <text x="830" y="251" class="desc" text-anchor="middle">Sibling feature module</text>

  <rect x="120" y="286" width="360" height="260" rx="16" fill="#ffffff" stroke="#1971c2" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="142" y="318" class="label">NotesModule</text>
  <rect x="150" y="350" width="140" height="72" rx="10" fill="#d0ebff" stroke="#1971c2" stroke-width="2"/>
  <text x="220" y="380" class="label" text-anchor="middle">NotesController</text>
  <text x="220" y="404" class="desc" text-anchor="middle">HTTP adapter</text>
  <rect x="320" y="350" width="130" height="72" rx="10" fill="#d3f9d8" stroke="#2b8a3e" stroke-width="2"/>
  <text x="385" y="380" class="label" text-anchor="middle">NotesService</text>
  <text x="385" y="404" class="desc" text-anchor="middle">Business + memory</text>
  <path class="inject" d="M320 386 L290 386"/>
  <text x="305" y="340" class="desc" text-anchor="middle">NotesService injected into Controller</text>

  <rect x="170" y="454" width="270" height="64" rx="10" fill="#ffec99" stroke="#e67700" stroke-width="2"/>
  <text x="305" y="481" class="label" text-anchor="middle">imports: [ClockModule]</text>
  <text x="305" y="503" class="desc" text-anchor="middle">Consumes the exported token</text>

  <rect x="650" y="286" width="310" height="260" rx="16" fill="#ffffff" stroke="#7048e8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="672" y="318" class="label">ClockModule</text>
  <path class="edge" d="M480 300 L648 300"/>
  <text x="564" y="289" class="desc" text-anchor="middle">imports ClockModule</text>
  <rect x="700" y="350" width="210" height="72" rx="10" fill="#e5dbff" stroke="#7048e8" stroke-width="2"/>
  <text x="805" y="380" class="label" text-anchor="middle">ClockService</text>
  <text x="805" y="404" class="desc" text-anchor="middle">Provider · singleton default</text>
  <rect x="700" y="454" width="210" height="64" rx="10" fill="#ffec99" stroke="#e67700" stroke-width="2"/>
  <text x="805" y="481" class="label" text-anchor="middle">exports: [ClockService]</text>
  <text x="805" y="503" class="desc" text-anchor="middle">Exposes one capability</text>

  <path class="inject" d="M700 386 C610 386 545 416 450 386"/>
  <text x="575" y="369" class="desc" text-anchor="middle">Container injects by token</text>
</svg>
