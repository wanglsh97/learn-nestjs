<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" role="img"><defs><style>text{font-family:'Kaiti SC','KaiTi',Arial,sans-serif;fill:#1b1b1f}.t{font-size:24px;font-weight:700}.l{font-size:18px;font-weight:700}.n{font-size:14px;fill:#495057}.b{stroke-width:2}</style></defs><rect width="1040" height="620" fill="#fff"/><text x="40" y="46" class="t">测试边界：反馈速度、真实度与隔离成本</text><path d="M520 90L750 245H290Z" fill="#d0ebff" stroke="#1971c2" class="b"/><text x="520" y="165" text-anchor="middle" class="l">HTTP E2E</text><text x="520" y="190" text-anchor="middle" class="n">Supertest + AppModule + 迁移</text><path d="M290 270H750L875 410H165Z" fill="#e5dbff" stroke="#7048e8" class="b"/><text x="520" y="330" text-anchor="middle" class="l">集成测试</text><text x="520" y="357" text-anchor="middle" class="n">AuthService + 仓储 + SQL.js + JWT</text><path d="M165 435H875L990 565H50Z" fill="#d3f9d8" stroke="#2b8a3e" class="b"/><text x="520" y="493" text-anchor="middle" class="l">单元测试</text><text x="520" y="520" text-anchor="middle" class="n">validateConfig / RolesGuard + overrideProvider</text><text x="80" y="595" class="n">更多、更快、更隔离</text><text x="800" y="595" class="n">更少、更真实、成本更高</text></svg>
