<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 520" role="img" aria-labelledby="title desc">
  <title id="title">Nest SQL 数据访问链路</title>
  <desc id="desc">请求从 Controller 进入 Service，经注入的 Repository 和 TypeORM DataSource 到达 SQL database，Migration 独立管理 schema。</desc>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@400;500;600&amp;family=Patrick+Hand&amp;display=swap');
      text { font-family: 'Patrick Hand', 'LXGW WenKai', 'Kaiti SC', 'KaiTi', sans-serif; fill: #1b1b1f; }
      .title { font-size: 24px; font-weight: 600; }
      .component { font-size: 18px; font-weight: 600; }
      .description { font-size: 14px; fill: #495057; }
      .label { font-size: 12px; fill: #495057; }
      .box { stroke-width: 2; }
      .arrow { fill: none; stroke: #495057; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .secondary { fill: none; stroke: #d9480f; stroke-width: 2; stroke-dasharray: 7 6; stroke-linecap: round; marker-end: url(#arrow-orange); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#495057"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9480f"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1238" height="518" rx="16" fill="#ffffff" stroke="#e9ecef"/>
  <text x="48" y="52" class="title">Nest SQL 数据访问链路</text>
  <text x="48" y="78" class="description">Nest 组织 dependency 与 lifecycle；TypeORM / driver 执行 SQL。</text>

  <rect x="42" y="112" width="1020" height="236" rx="16" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="62" y="140" class="label">Nest application graph</text>

  <path d="M 246 230 L 294 230" class="arrow"/>
  <path d="M 506 230 L 554 230" class="arrow"/>
  <path d="M 766 230 L 814 230" class="arrow"/>
  <path d="M 1026 230 L 1074 230" class="arrow"/>

  <rect x="74" y="178" width="172" height="104" rx="12" fill="#d0ebff" stroke="#1971c2" class="box"/>
  <text x="160" y="218" text-anchor="middle" class="component">Controller</text>
  <text x="160" y="244" text-anchor="middle" class="description">HTTP protocol</text>

  <rect x="294" y="178" width="212" height="104" rx="12" fill="#d3f9d8" stroke="#2b8a3e" class="box"/>
  <text x="400" y="218" text-anchor="middle" class="component">Service</text>
  <text x="400" y="244" text-anchor="middle" class="description">业务规则 / Transaction boundary</text>

  <rect x="554" y="178" width="212" height="104" rx="12" fill="#e5dbff" stroke="#7048e8" class="box"/>
  <text x="660" y="215" text-anchor="middle" class="component">Repository&lt;Entity&gt;</text>
  <text x="660" y="242" text-anchor="middle" class="description">CRUD / QueryBuilder</text>
  <text x="660" y="263" text-anchor="middle" class="label">由 forFeature() 注册</text>

  <rect x="814" y="178" width="212" height="104" rx="12" fill="#ffec99" stroke="#e67700" class="box"/>
  <text x="920" y="215" text-anchor="middle" class="component">DataSource</text>
  <text x="920" y="242" text-anchor="middle" class="description">connection pool / Transaction</text>
  <text x="920" y="263" text-anchor="middle" class="label">由 forRoot() 注册</text>

  <rect x="1074" y="178" width="126" height="104" rx="12" fill="#e5dbff" stroke="#7048e8" class="box"/>
  <ellipse cx="1137" cy="198" rx="62" ry="18" fill="#f3f0ff" stroke="#7048e8" stroke-width="2"/>
  <text x="1137" y="230" text-anchor="middle" class="component">SQL</text>
  <text x="1137" y="254" text-anchor="middle" class="description">database</text>

  <text x="270" y="215" text-anchor="middle" class="label">调用</text>
  <text x="530" y="215" text-anchor="middle" class="label">DI</text>
  <text x="790" y="215" text-anchor="middle" class="label">执行</text>
  <text x="1050" y="215" text-anchor="middle" class="label">SQL</text>

  <rect x="554" y="394" width="212" height="82" rx="12" fill="#ffe8cc" stroke="#d9480f" class="box"/>
  <text x="660" y="428" text-anchor="middle" class="component">Migration</text>
  <text x="660" y="453" text-anchor="middle" class="description">versioned schema change</text>
  <path d="M 766 435 C 920 435, 1010 360, 1118 287" class="secondary"/>
  <text x="944" y="397" text-anchor="middle" class="label">deploy 阶段独立执行</text>

  <rect x="64" y="390" width="390" height="88" rx="12" fill="#f1f3f5" stroke="#495057" stroke-width="1.5"/>
  <text x="84" y="421" class="component">关键边界</text>
  <text x="84" y="447" class="description">Entity 描述 persistence model；DTO 描述外部输入。</text>
  <text x="84" y="469" class="description">Database constraint 才是最终一致性防线。</text>
</svg>
