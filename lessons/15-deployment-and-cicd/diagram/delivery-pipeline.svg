<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">知识管理 API 的安全交付链路</title><desc id="desc">代码提交经过 CI 门禁和镜像构建，先运行兼容迁移，再小流量发布；可观测信号决定继续放量或回滚镜像，数据恢复是独立路径。</desc>
  <defs><style>text{font-family:'Kaiti SC','KaiTi',Arial,sans-serif;fill:#1b1b1f}.t{font-size:27px;font-weight:700}.h{font-size:18px;font-weight:700}.n{font-size:14px;fill:#495057}.box{stroke-width:2.2;rx:17}.arrow{fill:none;stroke:#495057;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}</style><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#495057"/></marker></defs>
  <rect width="1260" height="760" fill="#fff"/><text x="48" y="52" class="t">从提交到放量：每一步都有可验证的退出条件</text>
  <rect x="45" y="120" width="170" height="105" fill="#d0ebff" stroke="#1971c2" class="box"/><text x="130" y="160" text-anchor="middle" class="h">代码提交</text><text x="130" y="190" text-anchor="middle" class="n">PR / immutable commit</text>
  <rect x="265" y="120" width="210" height="105" fill="#fff3bf" stroke="#f08c00" class="box"/><text x="370" y="156" text-anchor="middle" class="h">CI 质量门禁</text><text x="370" y="184" text-anchor="middle" class="n">lint · build · 第13课测试</text><text x="370" y="205" text-anchor="middle" class="n">任何失败立即停止</text>
  <rect x="525" y="120" width="210" height="105" fill="#e5dbff" stroke="#7048e8" class="box"/><text x="630" y="156" text-anchor="middle" class="h">构建候选镜像</text><text x="630" y="184" text-anchor="middle" class="n">多阶段 · 非 root</text><text x="630" y="205" text-anchor="middle" class="n">以 digest 标识</text>
  <rect x="785" y="120" width="205" height="105" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="887" y="156" text-anchor="middle" class="h">兼容迁移</text><text x="887" y="184" text-anchor="middle" class="n">独立一次性任务</text><text x="887" y="205" text-anchor="middle" class="n">扩展 → 迁移</text>
  <rect x="1040" y="120" width="175" height="105" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="1127" y="160" text-anchor="middle" class="h">小流量发布</text><text x="1127" y="190" text-anchor="middle" class="n">就绪检查后接流量</text>
  <path d="M215 172H265M475 172H525M735 172H785M990 172H1040" class="arrow"/>
  <rect x="900" y="330" width="270" height="118" fill="#d0ebff" stroke="#1971c2" class="box"/><text x="1035" y="368" text-anchor="middle" class="h">观察发布信号</text><text x="1035" y="398" text-anchor="middle" class="n">就绪检查 · 错误率 · 延迟</text><text x="1035" y="421" text-anchor="middle" class="n">资源饱和度 · 业务指标</text><path d="M1127 225V290Q1127 310 1107 310H1055V330" class="arrow"/>
  <path d="M1035 448V498" class="arrow"/><polygon points="1035,498 1135,558 1035,618 935,558" fill="#fff3bf" stroke="#f08c00" stroke-width="2.2"/><text x="1035" y="550" text-anchor="middle" class="h">阈值正常？</text><text x="1035" y="577" text-anchor="middle" class="n">持续窗口判断</text>
  <rect x="660" y="515" width="200" height="92" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="760" y="550" text-anchor="middle" class="h">继续放量</text><text x="760" y="578" text-anchor="middle" class="n">最终替换旧实例</text><path d="M935 558H860" class="arrow"/><text x="889" y="543" class="n">是</text>
  <rect x="1025" y="660" width="190" height="70" fill="#ffe3e3" stroke="#e03131" class="box"/><text x="1120" y="689" text-anchor="middle" class="h">回滚镜像 digest</text><text x="1120" y="714" text-anchor="middle" class="n">停止继续放量</text><path d="M1035 618V640Q1035 650 1045 650H1120V660" class="arrow"/><text x="1050" y="640" class="n">否</text>
  <rect x="45" y="515" width="510" height="142" fill="#f8f9fa" stroke="#868e96" class="box"/><text x="300" y="552" text-anchor="middle" class="h">数据变更是独立风险面</text><text x="300" y="584" text-anchor="middle" class="n">应用回滚不会自动撤销迁移 或新格式数据</text><text x="300" y="612" text-anchor="middle" class="n">依赖扩展/收缩、备份验证、前向修复与消息兼容</text><path d="M887 225C760 310 520 410 430 515" class="arrow"/>
  <path d="M660 561H555" class="arrow" stroke-dasharray="7 7"/><text x="365" y="493" class="n">仅在旧版本退出后执行收缩</text>
</svg>
