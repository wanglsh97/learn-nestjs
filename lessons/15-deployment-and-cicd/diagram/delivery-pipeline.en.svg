<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 760" role="img" aria-labelledby="title desc">
  <title id="title">Safe delivery path for the knowledge API</title><desc id="desc">A commit passes CI and image construction, then a compatible migration and canary release; observability signals decide promotion or image rollback, while data recovery remains separate.</desc>
  <defs><style>text{font-family:'Comic Sans MS','Segoe Print',Arial,sans-serif;fill:#1b1b1f}.t{font-size:27px;font-weight:700}.h{font-size:17px;font-weight:700}.n{font-size:13px;fill:#495057}.box{stroke-width:2.2;rx:17}.arrow{fill:none;stroke:#495057;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}</style><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#495057"/></marker></defs>
  <rect width="1260" height="760" fill="#fff"/><text x="48" y="52" class="t">Commit to promotion: every stage has a verifiable exit condition</text>
  <rect x="45" y="120" width="170" height="105" fill="#d0ebff" stroke="#1971c2" class="box"/><text x="130" y="160" text-anchor="middle" class="h">Commit</text><text x="130" y="190" text-anchor="middle" class="n">PR / immutable commit</text>
  <rect x="265" y="120" width="210" height="105" fill="#fff3bf" stroke="#f08c00" class="box"/><text x="370" y="156" text-anchor="middle" class="h">CI quality gates</text><text x="370" y="184" text-anchor="middle" class="n">lint · build · lesson 13 tests</text><text x="370" y="205" text-anchor="middle" class="n">Stop on any failure</text>
  <rect x="525" y="120" width="210" height="105" fill="#e5dbff" stroke="#7048e8" class="box"/><text x="630" y="156" text-anchor="middle" class="h">Candidate image</text><text x="630" y="184" text-anchor="middle" class="n">Multi-stage · non-root</text><text x="630" y="205" text-anchor="middle" class="n">Identified by digest</text>
  <rect x="785" y="120" width="205" height="105" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="887" y="156" text-anchor="middle" class="h">Compatible migration</text><text x="887" y="184" text-anchor="middle" class="n">Separate one-shot task</text><text x="887" y="205" text-anchor="middle" class="n">expand → migrate</text>
  <rect x="1040" y="120" width="175" height="105" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="1127" y="160" text-anchor="middle" class="h">Canary release</text><text x="1127" y="190" text-anchor="middle" class="n">Traffic after readiness</text>
  <path d="M215 172H265M475 172H525M735 172H785M990 172H1040" class="arrow"/>
  <rect x="900" y="330" width="270" height="118" fill="#d0ebff" stroke="#1971c2" class="box"/><text x="1035" y="368" text-anchor="middle" class="h">Observe release signals</text><text x="1035" y="398" text-anchor="middle" class="n">readiness · errors · latency</text><text x="1035" y="421" text-anchor="middle" class="n">saturation · business metrics</text><path d="M1127 225V290Q1127 310 1107 310H1055V330" class="arrow"/>
  <path d="M1035 448V498" class="arrow"/><polygon points="1035,498 1135,558 1035,618 935,558" fill="#fff3bf" stroke="#f08c00" stroke-width="2.2"/><text x="1035" y="550" text-anchor="middle" class="h">Signals healthy?</text><text x="1035" y="577" text-anchor="middle" class="n">Evaluate over a window</text>
  <rect x="660" y="515" width="200" height="92" fill="#d3f9d8" stroke="#2b8a3e" class="box"/><text x="760" y="550" text-anchor="middle" class="h">Promote</text><text x="760" y="578" text-anchor="middle" class="n">Replace old instances</text><path d="M935 558H860" class="arrow"/><text x="889" y="543" class="n">yes</text>
  <rect x="1025" y="660" width="190" height="70" fill="#ffe3e3" stroke="#e03131" class="box"/><text x="1120" y="689" text-anchor="middle" class="h">Roll back digest</text><text x="1120" y="714" text-anchor="middle" class="n">Stop promotion</text><path d="M1035 618V640Q1035 650 1045 650H1120V660" class="arrow"/><text x="1050" y="640" class="n">no</text>
  <rect x="45" y="515" width="510" height="142" fill="#f8f9fa" stroke="#868e96" class="box"/><text x="300" y="552" text-anchor="middle" class="h">Data changes are a separate risk surface</text><text x="300" y="584" text-anchor="middle" class="n">Image rollback does not undo migrations or new-format data</text><text x="300" y="612" text-anchor="middle" class="n">Use expand/contract, verified backups, forward fixes, message compatibility</text><path d="M887 225C760 310 520 410 430 515" class="arrow"/>
  <path d="M660 561H555" class="arrow" stroke-dasharray="7 7"/><text x="330" y="493" class="n">contract only after old versions exit</text>
</svg>
